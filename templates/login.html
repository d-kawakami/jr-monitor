<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — JR監視 コントロールパネル</title>
  <style>
    :root {
      --primary: #1a73e8;
      --primary-dark: #1558b0;
      --danger: #ea4335;
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --text: #202124;
      --text-muted: #5f6368;
      --border: #dadce0;
      --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.15);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-row .logo { font-size: 28px; }
    .logo-row h1 { font-size: 17px; font-weight: 700; line-height: 1.3; }
    .logo-row .subtitle { font-size: 11px; color: var(--text-muted); }

    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 15px;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }

    .error-msg {
      background: #fce8e6;
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hint-msg {
      background: #e8f0fe;
      color: var(--primary);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .btn-login {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { background: var(--primary-dark); }
    .btn-login:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-row">
      <span class="logo">🚆</span>
      <div>
        <h1>JR監視 コントロールパネル</h1>
        <div class="subtitle">運行障害 LINE通知モニター</div>
      </div>
    </div>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <div class="hint-msg">
      初回は <strong>admin</strong> / パスワード空白でログインできます。<br>
      ログイン後にパスワードを設定してください。
    </div>

    <form method="post">
      <div class="form-group">
        <label for="username">ユーザー名</label>
        <input type="text" id="username" name="username" autocomplete="username"
               value="{{ request.form.get('username', '') }}" autofocus>
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">ログイン</button>
    </form>
  </div>
</body>
</html>
